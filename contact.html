<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | 前川 哲也</title>
  <meta
    name="description"
    content="前川哲也へのお問い合わせページです。"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="sub-hero">
    <div class="container">
      <p class="eyebrow">Contact</p>
      <h1>お問い合わせ</h1>
      <p class="lead">
        お仕事のご相談、その他ご連絡はこちらからお願いします。
      </p>
      <div class="hero-links">
        <a href="index.html" class="button secondary">Homeへ戻る</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container narrow">
        <div class="form-card">
          <h2>Contact Form</h2>
          <p class="form-intro">
            内容を確認のうえ、通常1〜3営業日以内を目安にご返信します。
          </p>

          <form
            action="https://formspree.io/f/ここを自分のFormspreeのIDに置き換え"
            method="POST"
            class="contact-form"
          >
            <label for="name">お名前</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="お名前"
              required
            />

            <label for="email">メールアドレス</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email address"
              required
            />

            <label for="subject">件名</label>
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="件名"
              required
            />

            <label for="message">お問い合わせ内容</label>
            <textarea
              id="message"
              name="message"
              rows="8"
              placeholder="お問い合わせ内容をご記入ください"
              required
            ></textarea>

            <input type="hidden" name="_subject" value="ポートフォリオサイトからお問い合わせが届きました" />

            <button type="submit" class="button primary submit-button">
              送信する
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Tetsuya Maekawa</p>
    </div>
  </footer>
</body>
</html>
